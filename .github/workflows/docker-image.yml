name: Sync and Build ik_llama (Weekly)

on:
  schedule:
    - cron: '0 0 * * 0' 
  workflow_dispatch:      

env:
  REGISTRY: ghcr.io

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      has_new_commits: ${{ steps.sync.outputs.has_new_commits }}
    steps:
      - name: Checkout your fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Sync with Upstream
        id: sync
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4.1
        with:
          target_sync_branch: main 
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}
          upstream_sync_repo: ikawrakow/ik_llama.cpp
          upstream_sync_branch: main
          target_branch_checkout_args: '-f' 

  build-and-push:
    needs: sync
    if: needs.sync.outputs.has_new_commits == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        type: [cpu, cuda]
        target: [full, swap]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lowercase Repository Name
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY@L}" >> ${GITHUB_ENV}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./docker 
          file: ./docker/ik_llama-${{ matrix.type }}.Containerfile
          target: ${{ matrix.target }}
          push: true
          build-args: |
            CUDA_DOCKER_ARCH=61;75;86;89;90
          tags: ghcr.io/${{ env.IMAGE_NAME }}:${{ matrix.type }}-${{ matrix.target }}
